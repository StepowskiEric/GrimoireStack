<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0b0a0f"/>
  <!-- cranium -->
  <ellipse cx="16" cy="13" rx="10" ry="9" fill="#1a1525" stroke="#d4af37" stroke-width=".5" opacity=".9"/>
  <!-- jaw -->
  <path d="M8 15 Q8 22 16 24 Q24 22 24 15" fill="#1a1525" stroke="#d4af37" stroke-width=".4" opacity=".8"/>
  <!-- left eye socket -->
  <ellipse cx="12" cy="13" rx="2.8" ry="3.2" fill="#0b0a0f" stroke="#d4af37" stroke-width=".25" opacity=".9"/>
  <!-- right eye socket -->
  <ellipse cx="20" cy="13" rx="2.8" ry="3.2" fill="#0b0a0f" stroke="#d4af37" stroke-width=".25" opacity=".9"/>
  <!-- nose -->
  <path d="M15 16 Q16 14.5 17 16 Q16 17.5 15 16Z" fill="#0b0a0f" stroke="#d4af37" stroke-width=".2" opacity=".8"/>
  <!-- teeth line -->
  <line x1="12" y1="19" x2="20" y2="19" stroke="#d4af37" stroke-width=".4" opacity=".5"/>
  <!-- teeth -->
  <rect x="13" y="19.2" width="1.2" height="1.5" rx=".3" fill="#0b0a0f" stroke="#d4af37" stroke-width=".15" opacity=".6"/>
  <rect x="15" y="19.2" width="1.2" height="1.5" rx=".3" fill="#0b0a0f" stroke="#d4af37" stroke-width=".15" opacity=".6"/>
  <rect x="17" y="19.2" width="1.2" height="1.5" rx=".3" fill="#0b0a0f" stroke="#d4af37" stroke-width=".15" opacity=".6"/>
  <!-- arcane mark on forehead -->
  <polygon points="16,7 16.8,9 19,9 17.3,10.3 18,12.5 16,11 14,12.5 14.7,10.3 13,9 15.2,9" fill="none" stroke="#d4af37" stroke-width=".25" opacity=".4"/>
</svg>
