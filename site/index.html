<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrimoireStack — Agent Spellbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:#0b0a0f;
  color:#d4c9a8;
  font-family:'Cormorant Garamond',serif;
  font-size:18px;
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
}
::selection{background:rgba(212,175,55,.35);color:#f5e6c8}

/* ── Animated Background ───────────────────────────── */
#particles{
  position:fixed;inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.particle{
  position:absolute;
  width:3px;height:3px;
  background:#d4af37;
  border-radius:50%;
  opacity:0;
  animation:float linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:.6}
  90%{opacity:.4}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}

/* ── Background Gradient Overlay ──────────────────── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(100,70,30,.12) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 50% 100%, rgba(60,40,100,.08) 0%, transparent 70%);
  pointer-events:none;z-index:0;
}

/* ── Header ──────────────────────────────────────────── */
header{
  position:relative;z-index:2;
  text-align:center;
  padding:60px 20px 30px;
}
header h1{
  font-family:'Cinzel',serif;
  font-weight:900;
  font-size:clamp(2rem,6vw,4.5rem);
  color:#d4af37;
  text-shadow:0 0 40px rgba(212,175,55,.25),0 0 80px rgba(212,175,55,.1);
  letter-spacing:.12em;
  text-transform:uppercase;
}
header .subtitle{
  font-family:'Cinzel',serif;
  font-weight:400;
  font-size:clamp(.85rem,2vw,1.2rem);
  color:#8a7a5a;
  letter-spacing:.35em;
  text-transform:uppercase;
  margin-top:8px;
}
header .ornament{
  color:#5a4a2a;
  font-size:1.6rem;
  margin-top:10px;
  letter-spacing:.5em;
}

/* ── School Tabs ────────────────────────────────────── */
.tabs-wrapper{
  position:relative;z-index:2;
  max-width:1400px;
  margin:0 auto;
  padding:0 20px;
}
.tabs{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;
  margin-bottom:40px;
}
.tab-btn{
  font-family:'Cinzel',serif;
  font-size:.72rem;
  font-weight:600;
  letter-spacing:.04em;
  text-transform:uppercase;
  padding:8px 16px;
  border:1px solid rgba(212,175,55,.2);
  border-radius:4px;
  background:rgba(20,15,30,.6);
  color:#8a7a5a;
  cursor:pointer;
  transition:all .3s ease;
  white-space:nowrap;
}
.tab-btn:hover{
  border-color:rgba(212,175,55,.5);
  color:#d4af37;
  background:rgba(30,22,40,.8);
  box-shadow:0 0 15px rgba(212,175,55,.08);
}
.tab-btn.active{
  border-color:#d4af37;
  color:#d4af37;
  background:rgba(40,30,50,.9);
  box-shadow:0 0 20px rgba(212,175,55,.12);
}

/* ── Search ─────────────────────────────────────────── */
.search-wrapper{
  position:relative;z-index:2;
  max-width:500px;
  margin:0 auto 30px;
  padding:0 20px;
}
.search-wrapper input{
  width:100%;
  padding:12px 18px 12px 44px;
  background:rgba(20,15,30,.7);
  border:1px solid rgba(212,175,55,.15);
  border-radius:6px;
  color:#d4c9a8;
  font-family:'Cormorant Garamond',serif;
  font-size:1.05rem;
  outline:none;
  transition:border-color .3s,box-shadow .3s;
}
.search-wrapper input:focus{
  border-color:rgba(212,175,55,.5);
  box-shadow:0 0 20px rgba(212,175,55,.08);
}
.search-wrapper input::placeholder{color:#5a4a3a}
.search-wrapper .search-icon{
  position:absolute;
  left:30px;top:50%;
  transform:translateY(-50%);
  color:#5a4a3a;
  font-size:1.1rem;
  pointer-events:none;
}

/* ── Grimoire Book ──────────────────────────────────── */
.grimoire{
  position:relative;z-index:2;
  max-width:1400px;
  margin:0 auto 60px;
  padding:0 20px;
}
.book-spread{
  display:grid;
  grid-template-columns:1fr;
  gap:0;
  background:
    radial-gradient(ellipse 100% 100% at 50% 50%, rgba(30,22,40,.9), rgba(15,10,20,.95));
  border:1px solid rgba(212,175,55,.12);
  border-radius:12px;
  padding:30px 24px;
  position:relative;
  box-shadow:
    0 0 60px rgba(0,0,0,.5),
    inset 0 0 60px rgba(212,175,55,.03);
}
.book-spread::before{
  content:'';
  position:absolute;
  inset:8px;
  border:1px solid rgba(212,175,55,.06);
  border-radius:8px;
  pointer-events:none;
}

/* ── School Section ─────────────────────────────────── */
.school-section{display:none}
.school-section.active{display:block}
.school-header{
  text-align:center;
  margin-bottom:30px;
  padding-bottom:20px;
  border-bottom:1px solid rgba(212,175,55,.1);
}
.school-header .school-symbol{
  font-size:2rem;
  color:#d4af37;
  display:block;
  margin-bottom:6px;
}
.school-header h2{
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:clamp(1.3rem,3vw,2rem);
  color:#d4af37;
  letter-spacing:.08em;
}
.school-header .school-desc{
  font-style:italic;
  color:#8a7a5a;
  font-size:.95rem;
  margin-top:4px;
}
.spell-count{
  display:inline-block;
  font-family:'Cinzel',serif;
  font-size:.7rem;
  color:#6a5a3a;
  border:1px solid rgba(212,175,55,.1);
  padding:2px 10px;
  border-radius:10px;
  margin-top:8px;
  letter-spacing:.05em;
}

/* ── Spell Grid ─────────────────────────────────────── */
.spell-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:16px;
}
@media(min-width:768px){
  .book-spread{padding:40px 36px}
  .spell-grid{grid-template-columns:1fr 1fr}
}
@media(min-width:1100px){
  .spell-grid{grid-template-columns:1fr 1fr 1fr}
}

/* ── Spell Card ─────────────────────────────────────── */
.spell-card{
  background:linear-gradient(135deg, rgba(30,22,40,.7), rgba(20,15,30,.7));
  border:1px solid rgba(212,175,55,.08);
  border-radius:8px;
  padding:18px;
  cursor:pointer;
  transition:all .4s ease;
  position:relative;
  overflow:hidden;
}
.spell-card::before{
  content:'';
  position:absolute;
  top:-50%;left:-50%;
  width:200%;height:200%;
  background:radial-gradient(circle at 30% 20%, rgba(212,175,55,.03), transparent 60%);
  opacity:0;
  transition:opacity .5s ease;
}
.spell-card:hover{
  border-color:rgba(212,175,55,.25);
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(0,0,0,.3),0 0 20px rgba(212,175,55,.05);
}
.spell-card:hover::before{opacity:1}
.spell-card .spell-tier{
  font-family:'Cinzel',serif;
  font-size:.6rem;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:#6a5a3a;
  margin-bottom:6px;
}
.spell-card .spell-name{
  font-family:'Cinzel',serif;
  font-weight:600;
  font-size:1rem;
  color:#d4c9a8;
  margin-bottom:4px;
  line-height:1.3;
}
.spell-card .spell-incantation{
  font-family:'MedievalSharp',cursive;
  font-size:.8rem;
  color:#6b5a4a;
  margin-bottom:8px;
  font-style:italic;
}
.spell-card .spell-effect{
  font-size:.92rem;
  color:#a89878;
  line-height:1.5;
}
.spell-card .spell-status{
  display:inline-block;
  font-family:'Cinzel',serif;
  font-size:.55rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  padding:2px 10px;
  border-radius:8px;
  margin-top:10px;
  border:1px solid;
}
.spell-card .spell-status.proven{color:#6aaa6a;border-color:rgba(106,170,106,.2);background:rgba(106,170,106,.05)}
.spell-card .spell-status.new{color:#c9a84c;border-color:rgba(201,168,76,.2);background:rgba(201,168,76,.05)}
.spell-card .spell-status.framework{color:#8a7aaa;border-color:rgba(138,122,170,.2);background:rgba(138,122,170,.05)}
.spell-card .spell-status.hybrid{color:#7ab8c9;border-color:rgba(122,184,201,.2);background:rgba(122,184,201,.05)}
.spell-card .spell-status.includes{color:#c97a7a;border-color:rgba(201,122,122,.2);background:rgba(201,122,122,.05)}

/* ── Empty State ────────────────────────────────────── */
.no-spells{
  text-align:center;
  padding:40px 20px;
  color:#5a4a3a;
  font-style:italic;
  font-size:1.1rem;
  grid-column:1/-1;
}

/* ── Footer ─────────────────────────────────────────── */
footer{
  position:relative;z-index:2;
  text-align:center;
  padding:30px 20px 50px;
  color:#4a3a2a;
  font-size:.85rem;
}
footer .footer-ornament{

  letter-spacing:.3em;
  font-size:1.2rem;
  display:block;
  margin-bottom:8px;
}
footer a{color:#6a5a3a;text-decoration:none}
footer a:hover{color:#d4af37}

/* ── Responsive ─────────────────────────────────────── */
@media(max-width:500px){
  .tabs{gap:4px}
  .tab-btn{font-size:.65rem;padding:6px 10px}
  .book-spread{padding:20px 14px;border-radius:8px}
  .spell-card{padding:14px}
}
</style>
</head>

// ══════════════════════════════════════════════════════════════
//  BUILD THE GRIMOIRE
// ══════════════════════════════════════════════════════════════

const tabsEl = document.getElementById('tabContainer');
const bookEl = document.getElementById('bookSpread');
const searchInput = document.getElementById('searchInput');

// Build tabs
schools.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
  btn.dataset.school = s.id;
  btn.textContent = `${s.symbol} ${s.name}`;
  btn.addEventListener('click', () => selectSchool(s.id));
  tabsEl.appendChild(btn);
});

// Build school sections
schools.forEach((s, i) => {
  const section = document.createElement('div');
  section.className = 'school-section' + (i === 0 ? ' active' : '');
  section.id = `school-${s.id}`;
  section.dataset.school = s.id;

  // Header
  const header = document.createElement('div');
  header.className = 'school-header';
  header.innerHTML = `
    <span class="school-symbol">${s.symbol}</span>
    <h2>${s.name}</h2>
    <p class="school-desc">${s.desc}</p>
    <span class="spell-count">${s.spells.length} incantation${s.spells.length !== 1 ? 's' : ''}</span>
  `;
  section.appendChild(header);

  // Grid
  const grid = document.createElement('div');
  grid.className = 'spell-grid';
  grid.id = `grid-${s.id}`;

  s.spells.forEach(sp => {
    const card = document.createElement('div');
    card.className = 'spell-card';
    card.dataset.search = `${sp.name} ${sp.skill} ${sp.effect}`.toLowerCase();

    const statusClass = sp.status.toLowerCase().replace(/[^a-z]/g,'');
    const tier = sp.status !== '—' ? `✧ ${sp.status}` : '';

    card.innerHTML = `
      ${tier ? `<div class="spell-tier">${tier}</div>` : ''}
      <div class="spell-name">${sp.name}</div>
      <div class="spell-incantation">〈 ${sp.skill} 〉</div>
      <div class="spell-effect">${sp.effect}</div>
    `;

    grid.appendChild(card);
  });

  section.appendChild(grid);
  bookEl.appendChild(section);
});

// ══════════════════════════════════════════════════════════════
//  INTERACTIONS
// ══════════════════════════════════════════════════════════════

let currentSchool = schools[0].id;

function selectSchool(id) {
  currentSchool = id;
  document.querySelectorAll('.school-section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(`school-${id}`).classList.add('active');
  document.querySelector(`.tab-btn[data-school="${id}"]`).classList.add('active');
  // Clear search when switching schools
  searchInput.value = '';
  document.querySelectorAll('.spell-card').forEach(el => el.style.display = '');
  document.querySelectorAll('.no-spells').forEach(el => el.remove());
}

// Search
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();

  // Show all schools if searching
  document.querySelectorAll('.school-section').forEach(el => {
    el.classList.toggle('active', !q || el.dataset.school === currentSchool);
  });
  document.querySelectorAll('.tab-btn').forEach(el => {
    el.classList.toggle('active', !q && el.dataset.school === currentSchool);
  });

  if (!q) {
    // Restore normal view
    selectSchool(currentSchool);
    return;
  }

  // Search across all sections
  document.querySelectorAll('.school-section').forEach(section => {
    const grid = section.querySelector('.spell-grid');
    let hasMatch = false;

    section.querySelectorAll('.spell-card').forEach(card => {
      const match = card.dataset.search.includes(q);
      card.style.display = match ? '' : 'none';
      if (match) hasMatch = true;
    });

    // Remove old no-spells
    grid.querySelectorAll('.no-spells').forEach(el => el.remove());

    if (!hasMatch) {
      const empty = document.createElement('div');
      empty.className = 'no-spells';
      empty.textContent = 'No incantations match your search…';
      grid.appendChild(empty);
    }

    section.classList.toggle('active', hasMatch || q);
  });
});

//  PARTICLE EFFECT
// ══════════════════════════════════════════════════════════════

(function initParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.width = (1 + Math.random() * 3) + 'px';
    p.style.height = p.style.width;
    p.style.animationDuration = (15 + Math.random() * 25) + 's';
    p.style.animationDelay = (Math.random() * 20) + 's';
    container.appendChild(p);
  }
})();
