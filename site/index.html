<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrimoireStack — The Warlock's Tome of Agent Incantations</title>
<link rel="icon" type="image/svg+xml" href="/favicon-hood.svg">
<link rel="alternate icon" href="/favicon-skull.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=MedievalSharp&family=Special+Elite&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:#07060b;
  color:#c8b99a;
  font-family:'Cormorant Garamond',serif;
  font-size:19px;
  line-height:1.65;
  min-height:100vh;
  overflow-x:hidden;
}
::selection{background:rgba(212,175,55,.35);color:#f5e6c8}

/* ── Animated Ember Background ──────────────────── */
#embers{
  position:fixed;inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}
.ember{
  position:absolute;
  border-radius:50%;
  opacity:0;
  animation:drift linear infinite;
}
.ember-amber{
  width:4px;height:4px;
  background:radial-gradient(circle,#ffaa33,#cc7722);
  box-shadow:0 0 6px #cc772288,0 0 12px #cc772244;
}
.ember-gold{
  width:3px;height:3px;
  background:radial-gradient(circle,#ffdd55,#d4af37);
  box-shadow:0 0 6px #d4af3788,0 0 12px #d4af3744;
}
.ember-rune{
  width:5px;height:5px;
  background:radial-gradient(circle,#aa88ff,#6633cc);
  box-shadow:0 0 8px #6633cc88,0 0 16px #6633cc44;
}
@keyframes drift{
  0%{transform:translateY(100vh) translateX(0) scale(0);opacity:0}
  8%{opacity:1}
  85%{opacity:.6}
  100%{transform:translateY(-10vh) translateX(40px) scale(1);opacity:0}
}

/* ── Background Overlay ─────────────────────────── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 90% 60% at 50% 0%, rgba(180,80,20,.06) 0%, transparent 70%),
    radial-gradient(ellipse 70% 50% at 50% 100%, rgba(80,30,120,.05) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.005) 2px, rgba(255,255,255,.005) 3px);
  pointer-events:none;z-index:0;
}

/* ── Header ─────────────────────────────────────── */
header{
  position:relative;z-index:2;
  text-align:center;
  padding:50px 20px 20px;
}
header .wax-seal{
  width:80px;height:80px;
  margin:0 auto 18px;
  background:radial-gradient(circle at 40% 35%, #9a1a1a, #5a0a0a 60%, #3a0505);
  border-radius:50%;
  border:3px solid #d4af37;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cinzel Decorative',serif;
  font-size:1.8rem;color:#d4af37;
  box-shadow:0 0 30px rgba(212,175,55,.15),inset 0 0 20px rgba(0,0,0,.4);
  position:relative;
}
header .wax-seal::after{
  content:'';position:absolute;inset:6px;
  border:1px solid rgba(212,175,55,.2);
  border-radius:50%;
}
header h1{
  font-family:'Cinzel Decorative',serif;
  font-weight:900;
  font-size:clamp(1.8rem,5vw,4rem);
  color:#d4af37;
  text-shadow:
    0 0 40px rgba(212,175,55,.2),
    0 0 80px rgba(212,175,55,.08),
    2px 2px 0px #00000040;
  letter-spacing:.08em;
}
header .subtitle{
  font-family:'Cinzel',serif;
  font-weight:400;
  font-size:clamp(.75rem,1.5vw,.95rem);
  color:#6a5a3a;
  letter-spacing:.3em;
  text-transform:uppercase;
  margin-top:6px;
}
header .flare{
  display:flex;align-items:center;justify-content:center;
  gap:16px;margin-top:12px;
  color:#3a2a1a;font-size:1.2rem;
}
header .flare span{display:inline-block;animation:flarePulse 3s ease-in-out infinite}
header .flare span:nth-child(2){animation-delay:.5s}
header .flare span:nth-child(3){animation-delay:1s}
@keyframes flarePulse{
  0%,100%{opacity:.3}
  50%{opacity:.7}
}

/* ── Tab Bar ────────────────────────────────────── */
.tabs-wrapper{
  position:relative;z-index:2;
  max-width:1400px;margin:0 auto;padding:0 16px;
}
.tabs{
  display:flex;flex-wrap:wrap;gap:5px;
  justify-content:center;margin-bottom:30px;
}
.tab-btn{
  font-family:'Cinzel',serif;
  font-size:.65rem;font-weight:600;
  letter-spacing:.03em;text-transform:uppercase;
  padding:7px 12px;
  border:1px solid rgba(212,175,55,.12);
  border-radius:3px;
  background:linear-gradient(135deg, rgba(20,15,30,.7), rgba(15,10,20,.7));
  color:#6a5a3a;
  cursor:pointer;
  transition:all .35s ease;
  white-space:nowrap;
}
.tab-btn:hover{
  border-color:rgba(212,175,55,.4);
  color:#d4af37;
  background:linear-gradient(135deg, rgba(30,22,40,.9), rgba(20,15,30,.9));
  box-shadow:0 0 12px rgba(212,175,55,.06);
}
.tab-btn.active{
  border-color:rgba(212,175,55,.6);
  color:#d4af37;
  background:linear-gradient(135deg, rgba(40,30,55,.95), rgba(25,18,35,.95));
  box-shadow:0 0 20px rgba(212,175,55,.1),inset 0 0 15px rgba(212,175,55,.03);
}
.tab-btn .real-name{
  display:block;
  font-family:'Cormorant Garamond',serif;
  font-size:.6rem;text-transform:none;
  color:#5a4a3a;letter-spacing:.02em;
  margin-top:1px;
  font-weight:400;
}
.tab-btn.active .real-name{color:#7a6a4a}

/* ── Search ─────────────────────────────────────── */
.search-wrapper{
  position:relative;z-index:2;
  max-width:420px;margin:0 auto 25px;padding:0 16px;
}
.search-wrapper input{
  width:100%;
  padding:10px 14px 10px 38px;
  background:rgba(15,10,25,.8);
  border:1px solid rgba(212,175,55,.1);
  border-radius:4px;
  color:#c8b99a;
  font-family:'Cormorant Garamond',serif;
  font-size:1rem;
  outline:none;
  transition:border-color .3s,box-shadow .3s;
}
.search-wrapper input:focus{
  border-color:rgba(212,175,55,.35);
  box-shadow:0 0 15px rgba(212,175,55,.05);
}
.search-wrapper input::placeholder{color:#4a3a2a;font-style:italic}
.search-wrapper .search-icon{
  position:absolute;left:27px;top:50%;
  transform:translateY(-50%);
  color:#4a3a2a;font-size:1rem;
  pointer-events:none;
}

/* ── Grimoire Book ──────────────────────────────── */
.grimoire{
  position:relative;z-index:2;
  max-width:1400px;margin:0 auto 50px;padding:0 16px;
}
.book-spread{
  position:relative;
  background:
    radial-gradient(ellipse 120% 100% at 50% 50%, rgba(28,18,38,.92), rgba(12,8,18,.96));
  border:2px solid rgba(212,175,55,.1);
  border-radius:6px;
  padding:40px 30px;
  box-shadow:
    0 0 80px rgba(0,0,0,.6),
    0 0 30px rgba(212,175,55,.03),
    inset 0 0 80px rgba(212,175,55,.02);
  min-height:300px;
}
/* Corner ornaments */
.book-spread::before{
  content:'⚜';position:absolute;
  top:12px;left:18px;
  font-size:1.2rem;color:rgba(212,175,55,.08);
}
.book-spread::after{
  content:'⚜';position:absolute;
  bottom:12px;right:18px;
  font-size:1.2rem;color:rgba(212,175,55,.08);
  transform:rotate(180deg);
}
/* Book spine effect */
.book-spread .spine-line{
  position:absolute;top:0;bottom:0;left:50%;
  width:1px;
  background:linear-gradient(to bottom, transparent 5%, rgba(212,175,55,.08) 20%, rgba(212,175,55,.08) 80%, transparent 95%);
  pointer-events:none;
}
/* Page edge glow */
.book-spread .page-edge{
  position:absolute;
  left:0;right:0;top:0;height:3px;
  background:linear-gradient(90deg, transparent 5%, rgba(212,175,55,.06) 20%, rgba(212,175,55,.06) 80%, transparent 95%);
  pointer-events:none;
}
.book-spread .page-edge-bottom{
  position:absolute;
  left:0;right:0;bottom:0;height:3px;
  background:linear-gradient(90deg, transparent 5%, rgba(212,175,55,.06) 20%, rgba(212,175,55,.06) 80%, transparent 95%);
  pointer-events:none;
}

/* ── School Section ─────────────────────────────── */
.school-section{display:none;animation:fadeIn .5s ease}
.school-section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.school-header{
  text-align:center;margin-bottom:25px;
  padding-bottom:18px;
  border-bottom:1px solid rgba(212,175,55,.08);
  position:relative;
}
.school-header::after{
  content:'◈';position:absolute;
  bottom:-9px;left:50%;transform:translateX(-50%);
  font-size:.7rem;color:rgba(212,175,55,.15);
  background:#0e0a14;padding:0 10px;
}
.school-header .school-symbol{font-size:2rem;display:block;margin-bottom:4px}
.school-header h2{
  font-family:'Cinzel',serif;
  font-weight:700;
  font-size:clamp(1.1rem,2.5vw,1.7rem);
  color:#d4af37;letter-spacing:.06em;
}
.school-header .school-desc{
  font-style:italic;color:#8a7a5a;font-size:.9rem;margin-top:3px;
}
.school-meta{
  display:flex;justify-content:center;gap:14px;margin-top:8px;
  font-family:'Cinzel',serif;font-size:.6rem;text-transform:uppercase;
  letter-spacing:.06em;
}
.school-meta .school-count{
  color:#6a5a3a;
  border:1px solid rgba(212,175,55,.08);
  padding:2px 10px;border-radius:8px;
}
.school-meta .school-real{
  color:#5a4a3a;
  font-family:'Cormorant Garamond',serif;
  text-transform:none;letter-spacing:.02em;
  font-size:.75rem;font-style:italic;
  border:1px solid rgba(212,175,55,.06);
  padding:2px 10px;border-radius:8px;
}

/* ── Spell Grid ─────────────────────────────────── */
.spell-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}
@media(min-width:700px){.spell-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1100px){.spell-grid{grid-template-columns:1fr 1fr 1fr}}

/* ── Spell Card ─────────────────────────────────── */
.spell-card{
  background:linear-gradient(145deg, rgba(25,18,35,.75), rgba(18,12,25,.75));
  border:1px solid rgba(212,175,55,.06);
  border-radius:5px;
  padding:16px 18px;
  cursor:pointer;
  transition:all .4s ease;
  position:relative;
  overflow:hidden;
}
.spell-card::before{
  content:'';
  position:absolute;top:-60%;left:-60%;
  width:220%;height:220%;
  background:radial-gradient(circle at 25% 20%, rgba(212,175,55,.03), transparent 55%);
  opacity:0;
  transition:opacity .6s ease;
  pointer-events:none;
}
.spell-card::after{
  content:'✦';
  position:absolute;bottom:8px;right:10px;
  font-size:.5rem;color:rgba(212,175,55,.04);
  pointer-events:none;
}
.spell-card:hover{
  border-color:rgba(212,175,55,.18);
  transform:translateY(-2px);
  box-shadow:
    0 8px 25px rgba(0,0,0,.3),
    0 0 15px rgba(212,175,55,.04);
}
.spell-card:hover::before{opacity:1}
.spell-card .spell-tier{
  font-family:'Cinzel',serif;
  font-size:.55rem;text-transform:uppercase;
  letter-spacing:.08em;
  color:#6a5a3a;margin-bottom:5px;
}
.spell-card .spell-name{
  font-family:'Cinzel',serif;
  font-weight:600;
  font-size:1rem;color:#d4c9a8;
  line-height:1.3;
}
.spell-card .spell-incantation{
  font-family:'Special Elite',cursive;
  font-size:.7rem;color:#5a4a3a;
  margin:2px 0 6px;
}
.spell-card .spell-effect{
  font-size:.88rem;color:#a89878;line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.spell-card .spell-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:8px;
}
.spell-card .spell-status{
  font-family:'Cinzel',serif;
  font-size:.5rem;text-transform:uppercase;
  letter-spacing:.06em;padding:2px 8px;
  border-radius:6px;border:1px solid;
}
.spell-card .spell-status.proven{color:#6aaa6a;border-color:rgba(106,170,106,.15);background:rgba(106,170,106,.04)}
.spell-card .spell-status.new{color:#c9a84c;border-color:rgba(201,168,76,.15);background:rgba(201,168,76,.04)}
.spell-card .spell-status.framework{color:#8a7aaa;border-color:rgba(138,122,170,.15);background:rgba(138,122,170,.04)}
.spell-card .spell-status.hybrid{color:#7ab8c9;border-color:rgba(122,184,201,.15);background:rgba(122,184,201,.04)}
.spell-card .spell-status.includes{color:#c97a7a;border-color:rgba(201,122,122,.15);background:rgba(201,122,122,.04)}
.spell-card .spell-reveal-hint{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;font-size:.7rem;color:#4a3a2a;
  transition:color .3s;
}
.spell-card:hover .spell-reveal-hint{color:#6a5a3a}

/* ── Spell Detail Modal ─────────────────────────── */
.modal-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  z-index:100;
  align-items:center;justify-content:center;
  padding:20px;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
.modal-overlay.open{display:flex}
.modal{
  background:linear-gradient(160deg, rgba(28,18,38,.98), rgba(15,10,22,.98));
  border:1px solid rgba(212,175,55,.15);
  border-radius:6px;
  max-width:580px;width:100%;
  max-height:90vh;overflow-y:auto;
  padding:35px 30px;
  position:relative;
  box-shadow:
    0 0 60px rgba(0,0,0,.5),
    0 0 30px rgba(212,175,55,.05),
    inset 0 0 40px rgba(212,175,55,.02);
  animation:modalIn .35s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(.92) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal .modal-close{
  position:absolute;top:12px;right:16px;
  background:none;border:none;
  color:#5a4a3a;font-size:1.5rem;
  cursor:pointer;transition:color .3s;
  font-family:'Cormorant Garamond',serif;
  line-height:1;
}
.modal .modal-close:hover{color:#d4af37}
.modal .modal-symbol{
  font-size:2.2rem;display:block;margin-bottom:6px;
}
.modal .modal-school{
  font-family:'Cinzel',serif;
  font-size:.65rem;text-transform:uppercase;
  letter-spacing:.08em;color:#6a5a3a;margin-bottom:2px;
}
.modal .modal-school .modal-school-real{
  font-family:'Cormorant Garamond',serif;
  text-transform:none;letter-spacing:.02em;
  font-size:.8rem;color:#5a4a3a;font-style:italic;
}
.modal .modal-title{
  font-family:'Cinzel',serif;
  font-weight:700;font-size:1.5rem;
  color:#d4af37;margin-bottom:2px;
  text-shadow:0 0 20px rgba(212,175,55,.1);
}
.modal .modal-incantation{
  font-family:'Special Elite',cursive;
  font-size:.85rem;color:#6a5a3a;
  margin-bottom:16px;
  padding-bottom:12px;
  border-bottom:1px solid rgba(212,175,55,.08);
}
.modal .modal-section-title{
  font-family:'Cinzel',serif;
  font-size:.6rem;text-transform:uppercase;
  letter-spacing:.08em;color:#6a5a3a;margin-bottom:4px;
}
.modal .modal-effect{
  font-size:1rem;color:#c8b99a;line-height:1.6;
  margin-bottom:16px;
}
.modal .modal-detail-row{
  display:flex;gap:12px;
  padding:8px 0;
  border-bottom:1px solid rgba(212,175,55,.04);
}
.modal .modal-detail-row:last-child{border-bottom:none}
.modal .modal-detail-label{
  font-family:'Cinzel',serif;
  font-size:.55rem;text-transform:uppercase;
  letter-spacing:.06em;color:#6a5a3a;
  min-width:80px;
}
.modal .modal-detail-value{
  font-size:.9rem;color:#a89878;
}
.modal .modal-detail-value .tag{
  display:inline-block;
  font-family:'Cinzel',serif;font-size:.5rem;
  text-transform:uppercase;letter-spacing:.05em;
  padding:2px 8px;border-radius:6px;border:1px solid;
}
.modal .modal-detail-value .tag.proven{color:#6aaa6a;border-color:rgba(106,170,106,.15)}
.modal .modal-detail-value .tag.new{color:#c9a84c;border-color:rgba(201,168,76,.15)}
.modal .modal-detail-value .tag.framework{color:#8a7aaa;border-color:rgba(138,122,170,.15)}
.modal .modal-detail-value .tag.hybrid{color:#7ab8c9;border-color:rgba(122,184,201,.15)}
.modal .modal-detail-value .tag.includes{color:#c97a7a;border-color:rgba(201,122,122,.15)}
.modal .modal-grimoire-ref{
  text-align:center;margin-top:20px;
  padding-top:14px;
  border-top:1px solid rgba(212,175,55,.06);
}
.modal .modal-grimoire-ref code{
  font-family:'Special Elite',cursive;
  font-size:.75rem;color:#5a4a3a;
  background:rgba(0,0,0,.2);
  padding:3px 10px;border-radius:3px;
}

/* ── No Results ─────────────────────────────────── */
.no-spells{
  text-align:center;padding:30px 20px;
  color:#4a3a2a;font-style:italic;font-size:1.05rem;
  grid-column:1/-1;
}

/* ── Footer ─────────────────────────────────────── */
footer{
  position:relative;z-index:2;
  text-align:center;padding:25px 20px 40px;
  color:#3a2a1a;font-size:.8rem;
}
footer .footer-ornament{color:#2a1a0a;letter-spacing:.3em;font-size:1.1rem;display:block;margin-bottom:6px}
footer a{color:#5a4a3a;text-decoration:none;transition:color .3s}
footer a:hover{color:#d4af37}

/* ── Responsive ─────────────────────────────────── */
@media(max-width:600px){
  .book-spread{padding:25px 16px;border-radius:4px}
  .spell-card{padding:12px 14px}
  .modal{padding:25px 20px}
  .tab-btn{font-size:.6rem;padding:5px 8px}
  header .wax-seal{width:60px;height:60px;font-size:1.3rem}
}
</style>
</head>
<body>

<!-- Embers -->
<div id="embers"></div>

<!-- Header -->
<header>
  <div class="wax-seal">⛧</div>
  <h1>GrimoireStack</h1>
  <div class="subtitle">The Warlock's Tome of Agent Incantations</div>
  <div class="flare"><span>⚜</span><span>✦</span><span>⚜</span></div>
</header>

<!-- Search -->
<div class="search-wrapper">
  <span class="search-icon">⟐</span>
  <input type="text" id="searchInput" placeholder="Search by spell name, incantation, or effect…" autocomplete="off">
</div>

<!-- Tabs -->
<div class="tabs-wrapper">
  <nav class="tabs" id="tabContainer"></nav>
</div>

<!-- Grimoire -->
<main class="grimoire">
  <div class="book-spread" id="bookSpread">
    <div class="spine-line"></div>
    <div class="page-edge"></div>
    <div class="page-edge-bottom"></div>
  </div>
</main>

<!-- Spell Detail Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <span class="modal-symbol" id="modalSymbol">⚔</span>
    <div class="modal-school"><span id="modalSchool"></span> <span class="modal-school-real" id="modalSchoolReal"></span></div>
    <div class="modal-title" id="modalTitle">—</div>
    <div class="modal-incantation" id="modalIncantation">〈 — 〉</div>
    <div class="modal-section-title">✦ Effect</div>
    <div class="modal-effect" id="modalEffect">—</div>
    <div class="modal-detail-row">
      <div class="modal-detail-label">Status</div>
      <div class="modal-detail-value"><span class="tag" id="modalStatus">—</span></div>
    </div>
    <div class="modal-detail-row">
      <div class="modal-detail-label">Skill Path</div>
      <div class="modal-detail-value" id="modalPath">—</div>
    </div>
    <div class="modal-grimoire-ref">
      <code id="modalRef">〈 grimoirestack:unknown 〉</code>
    </div>
  </div>
</div>

<!-- Footer -->
<footer>
  <span class="footer-ornament">⚜ ❦ ⚜</span>
  <p>GrimoireStack &copy; 2026 &middot; Forge your own incantations</p>
  <p><a href="https://github.com/StepowskiEric/GrimoireStack" target="_blank">⟐ Browse the source on GitHub ⟐</a></p>
</footer>

<script>
// ══════════════════════════════════════════════════════════════
//  SCHOOLS & SPELLS
// ══════════════════════════════════════════════════════════════

const schools = [
  {
    id:'debugging',real:'Debugging',
    name:'School of Remediation',symbol:'⚔',
    desc:'Incantations to banish bugs and restore order to broken code.',

// ══════════════════════════════════════════════════════════════
//  BUILD THE GRIMOIRE
// ══════════════════════════════════════════════════════════════

const tabsEl = document.getElementById('tabContainer');
const bookEl = document.getElementById('bookSpread');
const searchInput = document.getElementById('searchInput');

// Modal elements
const modalOverlay = document.getElementById('modalOverlay');
const modalClose = document.getElementById('modalClose');
const modalSymbol = document.getElementById('modalSymbol');
const modalSchool = document.getElementById('modalSchool');
const modalSchoolReal = document.getElementById('modalSchoolReal');
const modalTitle = document.getElementById('modalTitle');
const modalIncantation = document.getElementById('modalIncantation');
const modalEffect = document.getElementById('modalEffect');
const modalStatus = document.getElementById('modalStatus');
const modalPath = document.getElementById('modalPath');
const modalRef = document.getElementById('modalRef');

// Build tabs
schools.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
  btn.dataset.school = s.id;
  btn.innerHTML = `${s.symbol} ${s.name} <span class="real-name">${s.real}</span>`;
  btn.addEventListener('click', () => selectSchool(s.id));
  tabsEl.appendChild(btn);
});

// Build school sections
schools.forEach((s, i) => {
  const section = document.createElement('div');
  section.className = 'school-section' + (i === 0 ? ' active' : '');
  section.id = `school-${s.id}`;
  section.dataset.school = s.id;

  const header = document.createElement('div');
  header.className = 'school-header';
  header.innerHTML = `
    <span class="school-symbol">${s.symbol}</span>
    <h2>${s.name}</h2>
    <p class="school-desc">${s.desc}</p>
    <div class="school-meta">
      <span class="school-count">${s.spells.length} incantation${s.spells.length !== 1 ? 's' : ''}</span>
      <span class="school-real">also known as: ${s.real}</span>
    </div>
  `;
  section.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'spell-grid';
  grid.id = `grid-${s.id}`;

  s.spells.forEach(sp => {
    const card = document.createElement('div');
    card.className = 'spell-card';
    card.dataset.search = `${sp.name} ${sp.skill} ${sp.effect}`.toLowerCase();
    card.dataset.schoolId = s.id;

    const statusClass = (sp.status || '').toLowerCase().replace(/[^a-z]/g,'');
    const tier = sp.status && sp.status !== '—' ? `✧ ${sp.status}` : '';

    card.innerHTML = `
      ${tier ? `<div class="spell-tier">${tier}</div>` : ''}
      <div class="spell-name">${sp.name}</div>
      <div class="spell-incantation">〈 ${sp.skill} 〉</div>
      <div class="spell-effect">${sp.effect}</div>
      <div class="spell-footer">
        <span class="spell-status ${statusClass}">${tier || 'common'}</span>
        <span class="spell-reveal-hint">click to reveal</span>
      </div>
    `;

    card.addEventListener('click', () => openSpell(sp, s));
    grid.appendChild(card);
  });

  section.appendChild(grid);
  bookEl.appendChild(section);
});

// ══════════════════════════════════════════════════════════════
//  INTERACTIONS
// ══════════════════════════════════════════════════════════════

let currentSchool = schools[0].id;

function selectSchool(id) {
  currentSchool = id;
  document.querySelectorAll('.school-section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  const section = document.getElementById(`school-${id}`);
  if (section) section.classList.add('active');
  const tab = document.querySelector(`.tab-btn[data-school="${id}"]`);
  if (tab) tab.classList.add('active');
  searchInput.value = '';
  document.querySelectorAll('.spell-card').forEach(el => el.style.display = '');
  document.querySelectorAll('.no-spells').forEach(el => el.remove());
}

// Search
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) { selectSchool(currentSchool); return; }

  document.querySelectorAll('.school-section').forEach(section => {
    const grid = section.querySelector('.spell-grid');
    let hasMatch = false;
    section.querySelectorAll('.spell-card').forEach(card => {
      const match = card.dataset.search.includes(q);
      card.style.display = match ? '' : 'none';
      if (match) hasMatch = true;
    });
    grid.querySelectorAll('.no-spells').forEach(el => el.remove());
    if (!hasMatch) {
      const empty = document.createElement('div');
      empty.className = 'no-spells';
      empty.textContent = 'No incantations match your search across the stars…';
      grid.appendChild(empty);
    }
    section.classList.toggle('active', hasMatch);
  });
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
});

// ══════════════════════════════════════════════════════════════
//  SPELL DETAIL MODAL
// ══════════════════════════════════════════════════════════════

function openSpell(spell, school) {
  const statusStr = spell.status && spell.status !== '—' ? spell.status : 'Common';
  const statusClass = (spell.status || 'common').toLowerCase().replace(/[^a-z]/g,'') || 'common';

  modalSymbol.textContent = school.symbol;
  modalSchool.textContent = school.name;
  modalSchoolReal.textContent = `(${school.real})`;
  modalTitle.textContent = spell.name;
  modalIncantation.textContent = `〈 ${spell.skill} 〉`;
  modalEffect.textContent = spell.effect;
  modalStatus.textContent = statusStr;
  modalStatus.className = 'tag ' + statusClass;
  modalPath.textContent = spell.skill;

  // Show additional note if present
  if (spell.note) {
    let noteEl = document.querySelector('.modal-note');
    if (!noteEl) {
      noteEl = document.createElement('div');
      noteEl.className = 'modal-detail-row modal-note';
      document.querySelector('.modal .modal-incantation').after(noteEl);
    }
    noteEl.innerHTML = `<div class="modal-detail-label">Note</div><div class="modal-detail-value">${spell.note}</div>`;
    noteEl.style.display = 'flex';
  } else {
    const noteEl = document.querySelector('.modal-note');
    if (noteEl) noteEl.style.display = 'none';
  }

  modalRef.textContent = `〈 grimoirestack:${school.id}/${spell.skill} 〉`;
  modalOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modalOverlay.classList.remove('open');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

(function initEmbers() {
  const container = document.getElementById('embers');
  const types = ['ember-amber','ember-gold','ember-rune'];
  for (let i = 0; i < 50; i++) {
    const e = document.createElement('div');
    e.className = 'ember ' + types[i % 3];
    e.style.left = Math.random() * 100 + '%';
    e.style.width = e.style.height = (2 + Math.random() * 4) + 'px';
    e.style.animationDuration = (18 + Math.random() * 30) + 's';
    e.style.animationDelay = (Math.random() * 25) + 's';
    container.appendChild(e);
  }
})();
